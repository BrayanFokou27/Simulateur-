<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Ticket de pari</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="header">
    <span class="back">←</span>
    <h2>Informations sur le pari</h2>
    <span class="menu">⋮</span>
  </div>

  <div class="ticket">
    <div class="ticket-top">
      <div class="left">
        <div class="logo">FIFA</div>
        <div>
          <h3>Simple</h3>
          <p>N° 79672242123</p>
        </div>
      </div>
      <span class="live">• En direct</span>
    </div>

    <div class="details">
      <p><strong>Cotes:</strong> <span>2.05</span></p>
      <p><strong>Mise:</strong> <span>250 000 F</span></p>
      <p><strong>Gains potentiels:</strong> <span>512 500 F</span></p>
      <p><strong>Statut:</strong> <span class="status">Accepté</span></p>
    </div>

    <div class="match">
      <div class="match-header">
        <span>FIFA. FC24. Penalty</span>
        <span class="live">• En direct</span>
      </div>

      <div class="teams">
        <div class="team">
          <img src="barca.png" alt="">
          <p>Barcelone</p>
        </div>

        <span class="vs">VS</span>

        <div class="team">
          <img src="arsenal.png" alt="">
          <p>Arsenal</p>
        </div>
      </div>

      <p class="bet">
        Deux équipes vont marquer. Chaque Equipe va marquer (4) Ou Plus - Non
      </p>

      <div class="bottom">
        <span class="status">Accepté</span>
        <span class="odd">2.05</span>
      </div>
    </div>

  </div>

</div>

</body>
</html>
